name: Validate claims

# Schema-gate community claim PRs. Runs on any PR that touches a pending claim
# note. Uses only the default GITHUB_TOKEN — no secrets, no external services.

on:
  pull_request:
    paths:
      - "claims/pending/**.md"

permissions:
  contents: read

jobs:
  validate:
    name: Claim schema check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Collect changed claim files
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Added/Copied/Modified/Renamed files under claims/pending/*.md.
          git diff --name-only --diff-filter=ACMR "$BASE_SHA" "$HEAD_SHA" \
            -- 'claims/pending/**.md' > changed.txt || true
          echo "Changed claim files:"
          cat changed.txt || true
          # newline -> space, collapse
          FILES="$(tr '\n' ' ' < changed.txt)"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Validate claim schema
        run: |
          python .github/scripts/validate_claims.py ${{ steps.changed.outputs.files }}
